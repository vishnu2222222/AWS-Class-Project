{% extends "base.html" %}

{% block title %}Admin Login | {{ site_name }}{% endblock %}

{% block content %}
<section class="page-header">
  <div class="container shell-container">
    <span class="eyebrow meta-label">Admin</span>
    <h1>Messages dashboard sign-in</h1>
    <p>Use the environment-configured admin credentials to access saved contact submissions.</p>
  </div>
</section>

<section class="content-section">
  <div class="container shell-container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <article class="section-card panel">
          <form method="post">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control form-control-lg" id="username" name="username" required>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control form-control-lg" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-accent btn-lg w-100">Sign In</button>
          </form>
        </article>
      </div>
    </div>
  </div>
</section>
{% endblock %}
